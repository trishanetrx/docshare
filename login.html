<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to ClipShare">
    <title>Sign In — ClipShare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="toastContainer" class="toast-container"></div>

    <div class="auth-page">
        <div class="auth-box">
            <div class="auth-logo">
                <div class="auth-logo-icon"><i class="fas fa-clipboard"></i></div>
                <span class="auth-logo-text">ClipShare</span>
            </div>

            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to access your clipboard and files.</p>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="input" type="text" id="username" name="username"
                           placeholder="your username" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrap">
                        <input class="input" type="password" id="password" name="password"
                               placeholder="••••••••" autocomplete="current-password" required>
                        <button type="button" class="toggle-pw" id="togglePassword" aria-label="Toggle password">
                            <i id="passwordIcon" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn"
                        style="width:100%;justify-content:center;padding:.75rem;font-size:.95rem;margin-top:.5rem;">
                    <i class="fas fa-arrow-right-to-bracket"></i>
                    <span id="submitLabel">Sign In</span>
                </button>
            </form>

            <div class="auth-divider">
                Don't have an account? <a href="register.html">Create one</a>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
