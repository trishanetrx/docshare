<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ClipShare — clipboard and file sharing">
    <title>ClipShare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="toastContainer" class="toast-container"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-layout">

        <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon"><i class="fas fa-clipboard"></i></div>
                <span class="sidebar-logo-text">ClipShare</span>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-panel="clipboardPanel" id="navClipboard">
                    <i class="fas fa-clipboard-list"></i> Clipboard
                </button>
                <button class="nav-item" data-panel="filesPanel" id="navFiles">
                    <i class="fas fa-folder-open"></i> Files
                </button>
                <a class="nav-item" href="/share.html" style="text-decoration:none;">
                    <i class="fas fa-download"></i> Redeem PIN
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-pill">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <span class="user-name" id="userName">Loading…</span>
                    <button class="btn-icon" id="logoutButton" title="Sign out">
                        <i class="fas fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- ── Main ────────────────────────────────────────────────────────── -->
        <div class="app-main">

            <!-- Topbar -->
            <div class="app-topbar">
                <div style="display:flex;align-items:center;gap:.75rem;">
                    <button class="menu-toggle" id="menuToggle" aria-label="Menu">
                        <i class="fas fa-bars"></i>
                    </button>
                    <span class="topbar-title" id="topbarTitle">Clipboard</span>
                </div>
                <div style="display:flex;gap:.5rem;">
                    <!-- panel-specific action buttons injected here by JS -->
                </div>
            </div>

            <!-- Tab bar (visible on all screen sizes, replaces sidebar nav on mobile) -->
            <div class="tab-bar">
                <button class="tab-item active" data-panel="clipboardPanel">
                    <i class="fas fa-clipboard-list"></i>
                    <span>Clipboard</span>
                </button>
                <button class="tab-item" data-panel="filesPanel">
                    <i class="fas fa-folder-open"></i>
                    <span>Files</span>
                </button>
                <a class="tab-item" href="/share.html">
                    <i class="fas fa-key"></i>
                    <span>Redeem PIN</span>
                </a>
            </div>

            <!-- Content -->
            <div class="app-content">

                <!-- ── Clipboard Panel ───────────────────────────────────── -->
                <div class="panel active" id="clipboardPanel">

                    <!-- Input card -->
                    <div class="card" style="margin-bottom:1.25rem;">
                        <p class="section-title">New entry</p>
                        <textarea class="input" id="clipboardInput"
                            placeholder="Paste or type text here…" rows="5"></textarea>
                        <div style="display:flex;gap:.6rem;margin-top:.85rem;">
                            <button class="btn btn-primary" id="saveClipboard">
                                <i class="fas fa-floppy-disk"></i> Save
                            </button>
                            <button class="btn btn-ghost" id="clearClipboard">
                                <i class="fas fa-trash-can"></i> Clear all
                            </button>
                        </div>
                    </div>

                    <!-- Saved items -->
                    <p class="section-title">Saved items</p>
                    <div id="clipboardList">
                        <div class="empty-state" id="clipboardEmpty"
                             style="text-align:center;padding:3rem 1rem;color:var(--text-muted);font-size:.875rem;">
                            <i class="fas fa-clipboard" style="font-size:2rem;margin-bottom:.75rem;display:block;opacity:.3;"></i>
                            No saved items yet. Paste something above.
                        </div>
                    </div>
                </div>

                <!-- ── Files Panel ───────────────────────────────────────── -->
                <div class="panel" id="filesPanel">

                    <!-- Drop zone -->
                    <div class="card" style="margin-bottom:1.25rem;padding:0;overflow:hidden;">
                        <div class="drop-zone" id="dropZone">
                            <input type="file" id="fileInput" multiple>
                            <div class="drop-zone-icon"><i class="fas fa-cloud-arrow-up"></i></div>
                            <div class="drop-zone-text">Drop files here or click to browse</div>
                            <div class="drop-zone-sub">Max 2500 MB per file · Up to 20 files at once</div>
                        </div>

                        <!-- Selected files list + upload button -->
                        <div id="fileSelected" style="display:none;padding:1rem 1.25rem;border-top:1px solid var(--border);">
                            <div style="display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin-bottom:.6rem;">
                                <span id="selectedFilesCount" style="font-size:.8rem;color:var(--text-muted);font-weight:500;"></span>
                                <button class="btn btn-primary" id="uploadButton" style="flex-shrink:0;">
                                    <i class="fas fa-upload"></i> <span id="uploadButtonLabel">Upload</span>
                                </button>
                            </div>
                            <div id="selectedFilesList" style="display:flex;flex-direction:column;gap:.35rem;max-height:200px;overflow-y:auto;"></div>

                            <!-- Overall upload progress -->
                            <div id="uploadProgressWrap" style="display:none;margin-top:.85rem;">
                                <progress id="uploadProgress" value="0" max="100"></progress>
                                <p id="uploadProgressLabel" style="font-size:.72rem;color:var(--text-muted);margin-top:.3rem;">Uploading…</p>
                            </div>
                        </div>
                    </div>

                    <!-- File list -->
                    <p class="section-title">Uploaded files</p>
                    <div id="fileList">
                        <div id="filesEmpty"
                             style="text-align:center;padding:3rem 1rem;color:var(--text-muted);font-size:.875rem;">
                            <i class="fas fa-folder-open" style="font-size:2rem;margin-bottom:.75rem;display:block;opacity:.3;"></i>
                            No files uploaded yet.
                        </div>
                    </div>

                    <!-- Active shares -->
                    <div id="sharesSection" style="display:none;margin-top:1.75rem;">
                        <p class="section-title">Active shares</p>
                        <div id="activeShares"></div>
                    </div>
                </div>

            </div><!-- /app-content -->
        </div><!-- /app-main -->
    </div><!-- /app-layout -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-nginx.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
