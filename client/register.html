<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a ClipShare account">
    <title>Create Account — ClipShare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="toastContainer" class="toast-container"></div>

    <div class="auth-page">
        <div class="auth-box">
            <div class="auth-logo">
                <div class="auth-logo-icon"><i class="fas fa-clipboard"></i></div>
                <span class="auth-logo-text">ClipShare</span>
            </div>

            <h1 class="auth-title">Create account</h1>
            <p class="auth-subtitle">Get started — it's free.</p>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="input" type="text" id="username" name="username"
                           placeholder="choose a username" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrap">
                        <input class="input" type="password" id="password" name="password"
                               placeholder="min. 6 characters" autocomplete="new-password" required>
                        <button type="button" class="toggle-pw" id="togglePassword" aria-label="Toggle password">
                            <i id="passwordIcon" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input class="input" type="password" id="confirmPassword" name="confirmPassword"
                           placeholder="repeat your password" autocomplete="new-password" required>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn"
                        style="width:100%;justify-content:center;padding:.75rem;font-size:.95rem;margin-top:.5rem;">
                    <i class="fas fa-user-plus"></i>
                    <span id="submitLabel">Create Account</span>
                </button>
            </form>

            <div class="auth-divider">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
